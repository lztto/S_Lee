# Local development compose placeholder
services:
 
  # ─── PostgreSQL 데이터베이스 ───
  db:
    image: postgres:15
    container_name: reservation_db
    environment:
      POSTGRES_DB: reservation_db
      POSTGRES_USER: devtriple
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"         # 내 PC의 5432 포트 → 컨테이너 5432 포트
                            # DBeaver에서 localhost:5432 로 접속 가능
    volumes:
      - postgres_data:/var/lib/postgresql/data   # DB 데이터 영구 보존
      - ./backend/app/db/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
                            # 컨테이너 처음 실행 시 init.sql 자동 실행 (테이블 생성)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devtriple -d reservation_db"]
      interval: 5s
      timeout: 5s
      retries: 5
 
  # ─── FastAPI 백엔드 ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reservation_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://devtriple:password123@db:5432/reservation_db
      SECRET_KEY: dev-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"         # 내 PC의 8000 포트 → 컨테이너 8000 포트
                            # localhost:8000 으로 API 접속 가능
    volumes:
      - ./backend:/app      # 코드 변경 시 자동 반영 (hot reload)
    depends_on:
      db:
        condition: service_healthy   # DB가 완전히 뜬 다음에 FastAPI 실행
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
 
# ─── 데이터 영구 보존 볼륨 ───
volumes:
  postgres_data:
    # docker-compose down 해도 DB 데이터 유지
    # 완전히 삭제하려면 docker-compose down -v